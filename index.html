<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>calibration</title>

<meta property="og:title" content="calibration">
<meta property="og:description" content="hold to calibrate">
<meta property="og:image" content="preview.png">
<meta property="og:type" content="website">

<style>
:root{
  --bg:#050505;
  --fg:#f4f4f4;
  --muted:#a3a3a3;
  --blue:#00b7ff;
  --indigo:#2141ff;
  --lime:#72ff4f;
  --orange:#ff8b1f;
  --pink:#ff2f92;
  --red:#ff3040;
  --grid:rgba(255,255,255,.035);
  --grain:rgba(255,255,255,.05);
  --dot:#ffffff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050505;
  color:var(--fg);
  font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
  cursor:crosshair;
}

body{
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.035) 0%, rgba(255,255,255,0) 26%),
    #050505;
  transition:background .28s ease;
}

#screen{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
  opacity:.8;
  pointer-events:none;
}

.grain{
  position:absolute;
  inset:0;
  opacity:.16;
  background-image:
    repeating-linear-gradient(
      0deg,
      var(--grain) 0px,
      var(--grain) 1px,
      transparent 1px,
      transparent 2px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.02) 0px,
      rgba(255,255,255,.02) 1px,
      transparent 1px,
      transparent 2px
    );
  mix-blend-mode:screen;
  pointer-events:none;
}

.wrap{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  z-index:2;
}

.stack{
  width:min(760px, calc(100vw - 40px));
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
  text-align:center;
}

.kicker{
  font-size:.8rem;
  letter-spacing:.38em;
  text-transform:uppercase;
  color:#d9d9d9;
  font-weight:700;
  opacity:.9;
}

.field{
  position:relative;
  width:min(60vw, 420px);
  aspect-ratio:1/1;
  display:grid;
  place-items:center;
}

.ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  transition:transform .2s ease;
}

.r1{ inset:0; }
.r2{ inset:12%; }
.r3{ inset:24%; }
.r4{ inset:36%; }

.core{
  position:absolute;
  width:14%;
  aspect-ratio:1/1;
  border-radius:50%;
  background:#fff;
}

.message{
  font-size:1.4rem;
}

.sub{
  font-size:1rem;
  color:var(--muted);
}

.sig{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  color:#9d9d9d;
  font-size:.92rem;
  z-index:3;
}

/* ✦ ADDED HOME LINK STYLE */
.home-link{
  color:inherit;
  text-decoration:none;
  cursor:pointer;
  transition:opacity .2s ease;
}

.home-link:hover{
  opacity:.7;
}
</style>
</head>

<body>

<main id="screen">
  <div class="grid"></div>
  <div class="grain"></div>

  <div class="wrap">
    <div class="stack">
      <div class="kicker">calibration</div>

      <div class="field">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>

        <div class="core"></div>
      </div>

      <div class="message">hold to calibrate</div>
      <div class="sub">short contact produces noise<br>longer contact reveals more.</div>
    </div>
  </div>

  <!-- ✦ THIS IS THE ONLY THING WE CHANGED -->
  <div class="sig">
    <a href="https://haylortall.github.io/" class="home-link">♡ taylor</a>
  </div>

</main>

</body>
</html>
